<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lobsterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d63031;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lobsterGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e17055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2775CA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5fb4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#4a9eff" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="640"/><line x1="40" y1="0" x2="40" y2="640"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="120" y1="0" x2="120" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/><line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="280" y1="0" x2="280" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/><line x1="360" y1="0" x2="360" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="440" y1="0" x2="440" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="520" y1="0" x2="520" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/><line x1="680" y1="0" x2="680" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="760" y1="0" x2="760" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/><line x1="840" y1="0" x2="840" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="920" y1="0" x2="920" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/><line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1080" y1="0" x2="1080" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/><line x1="1160" y1="0" x2="1160" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/><line x1="1240" y1="0" x2="1240" y2="640"/>
    <line x1="1280" y1="0" x2="1280" y2="640"/>
    <line x1="0" y1="40" x2="1280" y2="40"/><line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="360" x2="1280" y2="360"/><line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="440" x2="1280" y2="440"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="520" x2="1280" y2="520"/><line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="600" x2="1280" y2="600"/><line x1="0" y1="640" x2="1280" y2="640"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="2" fill="#4a9eff"><animate attributeName="cy" values="100;80;100" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="200" r="1.5" fill="#00d2ff"><animate attributeName="cy" values="200;180;200" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="150" r="2.5" fill="#4a9eff"><animate attributeName="cy" values="150;130;150" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="120" r="1" fill="#00d2ff"><animate attributeName="cy" values="120;100;120" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="180" r="2" fill="#4a9eff"><animate attributeName="cy" values="180;160;180" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="500" r="1.5" fill="#00d2ff"><animate attributeName="cy" values="500;480;500" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="450" r="2" fill="#4a9eff"><animate attributeName="cy" values="450;430;450" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- === LEFT LOBSTER (Donor Agent) === -->
  <g transform="translate(200, 280)" filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="url(#lobsterGrad)" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="45" ry="28" fill="#ff7043" opacity="0.4"/>
    <!-- Head -->
    <ellipse cx="50" cy="-5" rx="25" ry="20" fill="url(#lobsterGrad)"/>
    <!-- Eyes -->
    <circle cx="62" cy="-18" r="5" fill="#fff"/>
    <circle cx="63" cy="-18" r="3" fill="#1a1f4e"/>
    <circle cx="64" cy="-19" r="1" fill="#fff"/>
    <!-- Eye stalks -->
    <line x1="55" y1="-15" x2="60" y2="-25" stroke="#d63031" stroke-width="3" stroke-linecap="round"/>
    <!-- Antenna -->
    <line x1="65" y1="-10" x2="95" y2="-35" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
    <line x1="65" y1="-5" x2="90" y2="-25" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left claw (holding USDC coin) -->
    <g transform="translate(70, 15)">
      <!-- Upper pincer -->
      <path d="M0,0 Q15,-15 35,-10 Q40,-5 35,0" fill="url(#lobsterGrad)" stroke="#c0392b" stroke-width="1"/>
      <!-- Lower pincer -->
      <path d="M0,0 Q15,10 30,5 Q35,0 35,0" fill="url(#lobsterGrad)" stroke="#c0392b" stroke-width="1"/>
    </g>
    <!-- Tail segments -->
    <ellipse cx="-50" cy="5" rx="20" ry="15" fill="#e17055"/>
    <ellipse cx="-65" cy="8" rx="15" ry="12" fill="#d63031"/>
    <path d="M-75,8 Q-95,-5 -100,8 Q-95,20 -75,8" fill="#c0392b"/>
    <!-- Legs -->
    <line x1="-20" y1="30" x2="-30" y2="55" stroke="#d63031" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="32" x2="-10" y2="58" stroke="#d63031" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="8" y2="55" stroke="#d63031" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="28" x2="28" y2="52" stroke="#d63031" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Digital circuit pattern on body -->
    <path d="M-20,-10 L-10,-10 L-5,-5 L5,-5 L10,-10 L20,-10" stroke="#ffab91" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="0" cy="-8" r="2" fill="#ffab91" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="80" text-anchor="middle" font-family="monospace" font-size="13" fill="#ff6b35" font-weight="bold">DONOR AGENT</text>
  </g>

  <!-- USDC Coin flying from left to right -->
  <g transform="translate(440, 260)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="url(#coinGrad)" stroke="#fff" stroke-width="2"/>
    <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">USDC</text>
    <!-- Motion trail -->
    <ellipse cx="-30" cy="0" rx="15" ry="3" fill="#2775CA" opacity="0.3"/>
    <ellipse cx="-50" cy="0" rx="10" ry="2" fill="#2775CA" opacity="0.15"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Another USDC coin -->
  <g transform="translate(500, 300)" filter="url(#glow)">
    <circle cx="0" cy="0" r="16" fill="url(#coinGrad)" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="1" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="8" fill="white" font-weight="bold">USDC</text>
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Connection lines (blockchain paths) -->
  <g stroke="#2775CA" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M320,285 Q400,250 520,285 Q600,310 680,285">
      <animate attributeName="stroke-dashoffset" from="200" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M320,295 Q420,330 540,295 Q620,270 700,310" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Base chain logo area -->
  <g transform="translate(640, 380)">
    <rect x="-45" y="-14" rx="7" ry="7" width="90" height="28" fill="#0052FF" opacity="0.8"/>
    <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">BASE CHAIN</text>
  </g>

  <!-- === RIGHT LOBSTER (Campaign Creator) === -->
  <g transform="translate(880, 280) scale(-1,1)" filter="url(#glow)">
    <!-- Body (mirrored) -->
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="url(#lobsterGrad2)" opacity="0.95"/>
    <ellipse cx="0" cy="0" rx="45" ry="28" fill="#e17055" opacity="0.4"/>
    <!-- Head -->
    <ellipse cx="50" cy="-5" rx="25" ry="20" fill="url(#lobsterGrad2)"/>
    <!-- Eyes -->
    <circle cx="62" cy="-18" r="5" fill="#fff"/>
    <circle cx="63" cy="-18" r="3" fill="#1a1f4e"/>
    <circle cx="64" cy="-19" r="1" fill="#fff"/>
    <!-- Eye stalks -->
    <line x1="55" y1="-15" x2="60" y2="-25" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
    <!-- Antenna -->
    <line x1="65" y1="-10" x2="95" y2="-35" stroke="#e17055" stroke-width="2" stroke-linecap="round"/>
    <line x1="65" y1="-5" x2="90" y2="-25" stroke="#e17055" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Claw -->
    <g transform="translate(70, 15)">
      <path d="M0,0 Q15,-15 35,-10 Q40,-5 35,0" fill="url(#lobsterGrad2)" stroke="#a93226" stroke-width="1"/>
      <path d="M0,0 Q15,10 30,5 Q35,0 35,0" fill="url(#lobsterGrad2)" stroke="#a93226" stroke-width="1"/>
    </g>
    <!-- Tail -->
    <ellipse cx="-50" cy="5" rx="20" ry="15" fill="#d63031"/>
    <ellipse cx="-65" cy="8" rx="15" ry="12" fill="#c0392b"/>
    <path d="M-75,8 Q-95,-5 -100,8 Q-95,20 -75,8" fill="#a93226"/>
    <!-- Legs -->
    <line x1="-20" y1="30" x2="-30" y2="55" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-5" y1="32" x2="-10" y2="58" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="30" x2="8" y2="55" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="28" x2="28" y2="52" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Circuit pattern -->
    <path d="M-20,-10 L-10,-10 L-5,-5 L5,-5 L10,-10 L20,-10" stroke="#ffab91" stroke-width="1" fill="none" opacity="0.5"/>
    <circle cx="0" cy="-8" r="2" fill="#ffab91" opacity="0.5"/>
  </g>
  <!-- Label for right lobster (not mirrored) -->
  <text x="880" y="360" text-anchor="middle" font-family="monospace" font-size="13" fill="#e17055" font-weight="bold">CAMPAIGN CREATOR</text>

  <!-- === SMALL LOBSTER (Observer/Community) === -->
  <g transform="translate(640, 470) scale(0.5)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="#ff9800" opacity="0.8"/>
    <ellipse cx="40" cy="-5" rx="20" ry="16" fill="#ff9800"/>
    <circle cx="50" cy="-15" r="4" fill="#fff"/>
    <circle cx="51" cy="-15" r="2.5" fill="#1a1f4e"/>
    <line x1="55" y1="-8" x2="75" y2="-25" stroke="#ff9800" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="-40" cy="5" rx="15" ry="12" fill="#f57c00"/>
    <path d="M-50,5 Q-65,-5 -70,5 Q-65,15 -50,5" fill="#e65100"/>
  </g>
  <text x="640" y="510" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff9800" opacity="0.8">COMMUNITY</text>

  <!-- Title -->
  <text x="640" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" fill="white" font-weight="bold" filter="url(#softGlow)">Agent GoFundMe</text>

  <!-- Subtitle -->
  <text x="640" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#4a9eff" opacity="0.9">Programmable Crowdfunding for AI Agents</text>

  <!-- Domain -->
  <g transform="translate(640, 170)">
    <rect x="-120" y="-16" rx="12" ry="12" width="240" height="32" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="16" fill="#00d2ff" font-weight="bold">gofundmyagent.com</text>
  </g>

  <!-- Feature badges -->
  <g transform="translate(640, 580)">
    <rect x="-480" y="-12" rx="6" ry="6" width="140" height="24" fill="#2775CA" opacity="0.3"/>
    <text x="-410" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#4a9eff">Multi-Chain USDC</text>

    <rect x="-310" y="-12" rx="6" ry="6" width="130" height="24" fill="#0052FF" opacity="0.3"/>
    <text x="-245" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#4a9eff">Base Settlement</text>

    <rect x="-150" y="-12" rx="6" ry="6" width="120" height="24" fill="#F38020" opacity="0.3"/>
    <text x="-90" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#F38020">Edge-Native</text>

    <rect x="0" y="-12" rx="6" ry="6" width="110" height="24" fill="#00d2ff" opacity="0.2"/>
    <text x="55" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#00d2ff">API-First</text>

    <rect x="140" y="-12" rx="6" ry="6" width="100" height="24" fill="#ff6b35" opacity="0.3"/>
    <text x="190" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#ff6b35">MCP Ready</text>

    <rect x="270" y="-12" rx="6" ry="6" width="120" height="24" fill="#27ae60" opacity="0.3"/>
    <text x="330" y="3" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="11" fill="#27ae60">Open Source</text>
  </g>

  <!-- Decorative corner brackets -->
  <g stroke="#4a9eff" stroke-width="2" fill="none" opacity="0.3">
    <path d="M20,20 L20,60 M20,20 L60,20"/>
    <path d="M1260,20 L1260,60 M1260,20 L1220,20"/>
    <path d="M20,620 L20,580 M20,620 L60,620"/>
    <path d="M1260,620 L1260,580 M1260,620 L1220,620"/>
  </g>
</svg>